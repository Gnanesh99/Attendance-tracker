{% extends "base.html" %}
{% block content %}
    <form action="/login" method="post">
        <input type="text" name="email" placeholder="Email"><br>
        <input type="text" name="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
    {% if error %}
        <p>{{error}}</p>
    {% endif %}

{% endblock %}
