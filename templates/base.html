<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111827">
    <title>{% block title %}Attendly{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="page-shell">
        <nav class="navbar" aria-label="Main navigation">
            <a class="brand" href="{{ url_for('attendance.dashboard') if session.get('user_id') else url_for('auth.login') }}">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M7 3v3M17 3v3M4.5 9h15M7.5 13h3v3h-3z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="5" width="18" height="16" rx="4" stroke="currentColor" stroke-width="2"/></svg>
                </span>
                <span>Attendly</span>
            </a>
            <div class="nav-links">
                {% if session.get('user_id') %}
                    <a class="nav-link" href="{{ url_for('attendance.dashboard') }}">Dashboard</a>
                    <a class="button button-ghost button-small" href="{{ url_for('auth.logout') }}">Log out</a>
                {% else %}
                    <a class="nav-link" href="{{ url_for('auth.login') }}">Log in</a>
                    <a class="button button-primary button-small" href="{{ url_for('auth.register') }}">Create account</a>
                {% endif %}
            </div>
        </nav>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
